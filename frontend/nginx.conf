# WebSocket 升级：中继（/api/v1/bitbrowser/relay/...）需要透传 Upgrade/Connection
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen       80;
    server_name  _;

    client_max_body_size 50m;

    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 4;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    root   /usr/share/nginx/html;
    index  index.html;

    # 反向代理后端：容器内通过 service 名 backend 通信
    # 由 docker-compose 的服务名解析到 backend:8009
    location /api/ {
        proxy_pass         http://backend:8009/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # 中继是长连接 WebSocket，空闲时靠 ws ping 保活；给足超时避免被中途掐断
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_socket_keepalive on;
    }

    location /healthz {
        proxy_pass http://backend:8009/healthz;
    }

    # Vue SPA history 路由兜底
    location / {
        try_files $uri $uri/ /index.html;
    }
}
